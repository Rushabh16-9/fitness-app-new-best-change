<mat-sidenav-container>
    <div fxLayout="row" fxLayoutAlign="center center" class="h-100">
        <div fxFlex="80" fxFlex.gt-sm="30" fxFlex.sm="60">
            <mat-card class="p-0 mat-elevation-z24 box">
                <div fxLayout="column" fxLayoutAlign="center center" class="bg-primary box-header">
                    <button mat-fab class="warning-color mat-elevation-z12">
                        <mat-icon>warning</mat-icon>
                    </button>
                    <h1 class="error">Under-Maintenance</h1>
                </div>
                <mat-card-content fxLayout="column" fxLayoutAlign="end center" class="box-content">
                    <mat-card fxLayout="column" fxLayoutAlign="center center" class="mat-elevation-z12 box-content-inner">
                        <span class="box-content-header server-error">Opps, We are Under-Maintenance</span>
                        <!-- <p class="box-text">Opps, We are Under-Maintenance.</p>  -->
                        <p class="box-text">Sorry for the inconvenience, but we are performing some maintenance at the moment.</p> 
                    </mat-card>
                    <button mat-raised-button color="primary" class="mat-elevation-z12 box-button" type="button" routerLink="/login">Refresh</button>
                </mat-card-content>
            </mat-card>
        </div>
    </div>
</mat-sidenav-container>
