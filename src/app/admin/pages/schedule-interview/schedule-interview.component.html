<div fxLayout="column wrap" fxLayout.gt-sm="row" class="schedule-interview">
  <div fxFlex="100" class="flex-p mb-padng-0">

    <mat-card *ngIf="showAvailableSlots" class="p-0 pad-btm-10 mb-padng-btm-0" style="margin-bottom:10px;">

      <mat-card-header class="bg-grey p-1" fxLayout="row" fxLayoutAlign="space-between center">
        <mat-card-title class="m-0">
          <h3 class="page-title"> Book Appointment </h3>
        </mat-card-title>
      </mat-card-header>

      <mat-card-content class="flex-p mb-padng-0">

        <div fxLayout="row wrap" fxFlex="100">
          <div *ngFor="let slot of allAvailableSlots;" fxLayout="column" fxFlex.gt-md="33.3" fxFlex.md="50" class="flex-p mb-flex-auto">
            <mat-card class="p-0">
              <div class="flex-p">
                <div>
                  <span class="details-sec">
                    <span class="details-title">Date:</span> {{slot.dateDisplay}}
                  </span>
                </div>
               <!--  <div>
                  <span class="details-sec">
                    <span class="details-title">Time:</span> {{slot.timeDisplay}}
                  </span>
                </div> -->
                <div>
                  <span class="details-sec">
                    <span class="details-title">Available Slots:</span> {{slot.availableSlots}}
                    <span class="details-sec">
                      <a (click)="onViewSlot(slot)" class="dwn-link">View!</a>
                    </span>                    
                  </span>
                </div>
                <!-- <div *ngIf="slot.availableSlots > 0">
                  <span class="details-sec">
                    <a (click)="onViewSlot(slot)" class="dwn-link">View Slots!</a>
                  </span>
                </div> -->
              </div>
            </mat-card>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card *ngIf="showBookedSlots" class="p-0 pad-btm-10 mb-padng-btm-0">

      <mat-card-header class="bg-grey p-1" fxLayout="row" fxLayoutAlign="space-between center">
        <mat-card-title class="m-0">
          <h3 class="page-title"> Booked Appointments </h3>
        </mat-card-title>
      </mat-card-header>

      <mat-card-content class="flex-p mb-padng-0">

        <!-- <div class="note-msg"> {{topNote}} </div> -->

        <ngx-datatable
          #pageTable
          class='material expandable ngx-datatable-custom striped'
          [columnMode]="'force'"
          [headerHeight]="50"
          [footerHeight]="50"
          [rowHeight]="'auto'"
          [scrollbarV]="false"
          [scrollbarH]="true"
          [externalPaging]="false"
          [limit]="pagination.limit"
          [offset]="pagination.offset"
          [rows]="tableData">
          <ngx-datatable-row-detail class="mb-width-100 mb-displ" [rowHeight]="'auto'" #myDetailRow>
            <ng-template class="mb-displ" let-row="row" let-expanded="expanded" ngx-datatable-row-detail-template>
              <div fxLayout="row wrap" fxFlex="100">
                <div class="mb-displ" style="padding: 14px;">
                  <div>
                    <span class="mb-datatable-header">Time:</span> {{row.timeDisplay}}
                  </div>
                  <div>
                    <span class="mb-datatable-header" style="margin-right: 10px;">Action:</span>
                    <span *ngIf="row.zoomLink" style="margin-bottom: 10px;">
                      <button (click)="onOpenLink(row.zoomLink)" mat-raised-button type="button" color="primary" class="mat-small-button" >Join!</button>
                    </span>
                  </div>
                </div>
              </div>
            </ng-template>
          </ngx-datatable-row-detail>

          <ngx-datatable-column [width]="50" [resizeable]="false" [sortable]="false" [draggable]="false" [canAutoResize]="false" class="mb-displ">
            <ng-template class="mb-displ" let-row="row" let-expanded="expanded" ngx-datatable-cell-template>
              <a (click)="toggleExpandRow(row)" href="javascript:void(0);" [class.datatable-icon-right]="!expanded" [class.datatable-icon-down]="expanded" title="Expand/Collapse Row" class="mb-displ">
              </a>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column class="mb-width-100" [sortable]="false" [resizeable]="false" name="dateDisplay">
            <ng-template let-column="column" ngx-datatable-header-template>
              <span>Date</span>
            </ng-template>
            <ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value">
              <span>
                {{value}}
              </span>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column [sortable]="false" [resizeable]="false" name="timeDisplay">
            <ng-template let-column="column" ngx-datatable-header-template class="mb-width-100">
              <span>Time</span>
            </ng-template>
            <ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value" class="mb-width-100">
              <span>
                {{value}}
              </span>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column [sortable]="false" [resizeable]="false" name="lmsScheduleId">
            <ng-template let-column="column" ngx-datatable-header-template class="mb-width-100">
              <span>Action</span>
            </ng-template>
            <ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value" class="mb-width-100">
              <div *ngIf="row.zoomLink" style="margin-bottom: 10px;">
                <button (click)="onOpenLink(row.zoomLink)" mat-raised-button type="button" color="primary" class="mat-small-button" >Join!</button>
              </div>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-footer>
            <ng-template ngx-datatable-footer-template let-rowCount="rowCount" let-pageSize="pageSize" let-selectedCount="selectedCount" let-curPage="curPage" let-offset="offset">
              <div class="ngx-rcds-per-page-div" *ngIf="rowCount > 0" >
                <span class="ngx-ftr-cnt-inf">
                  Total records: {{rowCount}}
                </span>
              </div>
              <datatable-pager class="ngx-pagint-blk" [pagerLeftArrowIcon]="'datatable-icon-left'" [pagerRightArrowIcon]="'datatable-icon-right'" [pagerPreviousIcon]="'datatable-icon-prev'" [pagerNextIcon]="'datatable-icon-skip'" [page]="curPage" [size]="pageSize" [count]="rowCount" [hidden]="!((rowCount / pageSize) > 1)" (change)="pageTable.onFooterPage($event)">
              </datatable-pager>
            </ng-template>
          </ngx-datatable-footer>
        </ngx-datatable>

        <!-- <div fxLayout="row wrap" fxFlex="100">
          <div *ngFor="let slot of allBookedSlots;" fxLayout="column" fxFlex class="flex-p mb-flex-auto">
            <mat-card class="p-0">
              <div class="flex-p">
                <div>
                  <span class="details-sec">
                    <span class="details-title">Date:</span> {{slot.dateDisplay}}
                  </span>
                </div>
                <div>
                  <span class="details-sec">
                    <span class="details-title">Time:</span> {{slot.timeDisplay}}
                  </span>
                </div>
                <div *ngIf="slot.zoomLink" style="margin-top: 10px; margin-bottom: 10px;">
                    <button (click)="onOpenLink(slot.zoomLink)" mat-raised-button type="button" color="primary" class="mat-small-button" >Join!</button>
                </div>
              </div>
            </mat-card>
          </div>
        </div> -->
      </mat-card-content>
    </mat-card>

  </div>
</div>
