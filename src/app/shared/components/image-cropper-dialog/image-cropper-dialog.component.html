<div fxLayout="column" class="image-cropper-dialog">
	<div class="flex-p mb-padng-0">
		<div mat-dialog-title class="modal-header">
			<b>{{modalTitle}}</b>
		</div>
		<div style="padding:0 30px;text-align: center;">
			<mat-dialog-content>
				<image-cropper
				[imageChangedEvent]="imageEvent"
				[maintainAspectRatio]="false"
				[aspectRatio]="1 / 1"
				[resizeToWidth]="0"
				[cropper]="coordinates"
				format="png"
				(imageCropped)="imageCropped($event)"
				(imageLoaded)="imageLoaded()"
				(loadImageFailed)="loadImageFailed()"></image-cropper>
			</mat-dialog-content>
		</div>
		<mat-dialog-actions class="close-btn" >
			<button mat-raised-button [mat-dialog-close]="true">Cancel</button>
			<button (click)="onOkClick()" [mat-dialog-close]="true" color="primary" mat-raised-button >OK</button>
		</mat-dialog-actions>
	</div>
</div>
