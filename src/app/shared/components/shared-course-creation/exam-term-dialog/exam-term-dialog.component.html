<div fxLayout="column" class="exam-term-dialog">
	<div class="flex-p mb-padng-0">
		<div mat-dialog-title class="modal-header">
			<b>{{modalTitle}}</b>
			<mat-icon (click)="onCloseClick()" class="dlg-cls-icn">close</mat-icon>
		</div>

		<mat-dialog-content>
		
			<div class="marg-top-20">
				
				<div class="table-container" >

					<div class="search-field-blk" fxLayout="row wrap">
						<mat-form-field class="flex-p" fxFlex="100" fxFlex.gt-sm="50" fxFlex.sm="50">
				        	<input matInput (keyup)='onInputSearch($event)' placeholder="Search" >
						</mat-form-field>
						<div class="flex-p text-right" fxFlex="100" fxFlex.gt-sm="50" fxFlex.sm="50">
							<button type="button" (click)="onAddEditTerm('add')" mat-raised-button class="mb-marg-top-10 mb-marg-left-0 mb-float-left" >+ Add New Term</button>
						</div>
					</div>

					<ngx-datatable
						#termTable
						class='material expandable ngx-datatable-custom striped'
						[columnMode]="'force'"
						[headerHeight]="50"
						[footerHeight]="50"
						[rowHeight]="'auto'"
						[scrollbarV]="false"
						[externalPaging]="false" 
						[limit]="page.limit"
						[offset]="page.offset"
						[rows]="tableData">

						<ngx-datatable-row-detail class="mb-width-100 mb-displ" [rowHeight]="'auto'" #myDetailRow>
						  <ng-template class="mb-displ" let-row="row" let-expanded="expanded" ngx-datatable-row-detail-template>
						    <div fxLayout="row wrap" fxFlex="100">
						      <div class="mb-displ" style="padding: 14px;">
						        <div>
						          <span class="mb-datatable-header"> Term Exam Id: </span> {{row.termExamId}}
						        </div>
		                        <div>
		                            <span class="mb-datatable-header">Action: </span>
		                            <span *ngIf="permissions.edit">
		                                <a class="dwn-link" (click)="onAddEditTerm('edit', row)">Edit!</a> 
		                            </span>
		                            <span *ngIf="permissions.delete">
		                                | <a class="dwn-link" (click)="onDeleteTerm(row)">Delete!</a>
		                            </span>
		                        </div>
						      </div>
						    </div>
						  </ng-template>
						</ngx-datatable-row-detail>        

						<ngx-datatable-column
						  [width]="50"
						  [resizeable]="false"
						  [sortable]="false"
						  [draggable]="false"
						  [canAutoResize]="false"
						  class="mb-displ"
						  >
						  <ng-template class="mb-displ" let-row="row" let-expanded="expanded" ngx-datatable-cell-template>
						    <a
						    href="javascript:void(0);"
						    [class.datatable-icon-right]="!expanded"
						    [class.datatable-icon-down]="expanded"
						    title="Expand/Collapse Row"
						    (click)="toggleExpandRow(row)" 
						    class="mb-displ"></a>
						  </ng-template>
						</ngx-datatable-column>

						<ngx-datatable-column class="mb-displ-none" [sortable]="false" [resizeable]="false" name="termExamId">
						  <ng-template let-column="column" ngx-datatable-header-template>
						    <span>Term Exam Id</span>
						  </ng-template>
						  <ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value">
						    <span>
						      {{value}}
						    </span>
						  </ng-template>
						</ngx-datatable-column>

						<ngx-datatable-column class="mb-width-100" [sortable]="false" [resizeable]="false" name="termExam">
						  <ng-template let-column="column" ngx-datatable-header-template>
						    <span>Term Exam</span>
						  </ng-template>
						  <ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value">
						    <span>
						      {{value}}
						    </span>
						  </ng-template>
						</ngx-datatable-column>

						<ngx-datatable-column class="mb-displ-none" [sortable]="false" [resizeable]="false" name="bankAccountId">
							<ng-template let-column="column" ngx-datatable-header-template>
								<span>Action</span>
							</ng-template>
							<ng-template ngx-datatable-cell-template let-rowIndex="rowIndex" let-row="row" let-value="value">
								<span *ngIf="permissions.edit">
									<a class="dwn-link" (click)="onAddEditTerm('edit', row)">Edit! </a>
								</span>
								<span *ngIf="permissions.delete">
									| <a class="dwn-link" (click)="onDeleteTerm(row)">Delete!</a>
								</span>
							</ng-template>
						</ngx-datatable-column>

			            <ngx-datatable-footer>
			              <ng-template 
			                ngx-datatable-footer-template 
			                let-rowCount="rowCount"
			                let-pageSize="pageSize"
			                let-selectedCount="selectedCount"
			                let-curPage="curPage"
			                let-offset="offset">
			                <div class="ngx-rcds-per-page-div" *ngIf="rowCount > 0" >
			                  <span class="ngx-ftr-cnt-inf">
		                  		Total records: {{rowCount}} | Selected: {{tableData.length}}
			                  </span>
			                  <span class="rcds-per-page">
			                    <span class="rcds-per-page-txt">
			                      Records Per Page: 
			                    </span>
			                    <mat-form-field class="rcds-per-page-drdwn">
			                      <mat-select (selectionChange)="changeRows($event.value)" [(value)]="page.limit">
			                        <mat-option *ngFor="let rowsPerPage of rowsPerPageArray" [value]="rowsPerPage">
			                          {{ rowsPerPage }}
			                        </mat-option>
			                      </mat-select>
			                    </mat-form-field>
			                  </span>
			                </div>
			                <datatable-pager
			                  class="ngx-pagint-blk"
			                  [pagerLeftArrowIcon]="'datatable-icon-left'"
			                  [pagerRightArrowIcon]="'datatable-icon-right'"
			                  [pagerPreviousIcon]="'datatable-icon-prev'"
			                  [pagerNextIcon]="'datatable-icon-skip'"
			                  [page]="curPage"
			                  [size]="pageSize"
			                  [count]="rowCount"
			                  [hidden]="!((rowCount / pageSize) > 1)"
			                  (change)="termTable.onFooterPage($event)">
			                </datatable-pager>
			              </ng-template>
			            </ngx-datatable-footer>

					</ngx-datatable>
				</div>
			</div>

		</mat-dialog-content>

	</div>
</div>
