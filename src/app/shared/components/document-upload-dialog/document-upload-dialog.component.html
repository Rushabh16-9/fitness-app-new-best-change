<div style="display: flex; justify-content: space-between; align-items: center; padding-right: 15px;">
  <h2 mat-dialog-title>Upload Documents</h2>
  <button mat-button [mat-dialog-close]="false" style="margin-top: -10px;">
    <mat-icon>close</mat-icon> Close
  </button>
</div>

<mat-dialog-content>
  <!-- Dynamic Grid View -->
  <div class="documents-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 10px;">
    
    <div *ngFor="let doc of documentsState; let i = index" class="doc-card" style="border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; background: #fafafa; display: flex; flex-direction: column;">
      <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 16px; color: #333;">{{doc.document_name}}</h3>
      
      <div style="margin: 10px 0;">
        <input type="file" (change)="onFileSelected($event, i)" accept=".jpg,.jpeg,.png,.pdf" style="max-width: 100%;">
      </div>
      
      <div *ngIf="doc.file" style="margin-top: 10px; color: #2e7d32; font-size: 13px; word-break: break-all;">
        Selected: {{doc.file.name}}
      </div>
      
      <div *ngIf="doc.imagePreviewUrl" style="margin-top: 15px; text-align: center;">
        <img [src]="doc.imagePreviewUrl" alt="Preview" style="max-width: 100%; max-height: 180px; border: 1px solid #ccc; border-radius: 4px; object-fit: contain;">
      </div>
      
      <div *ngIf="doc.isVerifying" style="margin-top: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end;">
        <mat-spinner diameter="30" style="margin: 0 auto;"></mat-spinner>
      </div>
      
      <div *ngIf="doc.verificationMessage && !doc.isVerifying" style="margin-top: 15px; font-weight: 500; font-size: 14px;" [style.color]="doc.verificationFailed ? '#d32f2f' : '#2e7d32'">
        {{doc.verificationMessage}}
      </div>
      
      <div *ngIf="doc.isExtracting && !doc.isVerifying" style="margin-top: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end;">
        <mat-spinner diameter="30" style="margin: 0 auto;"></mat-spinner>
        <p style="margin-top: 5px; font-size: 13px; color: #666;">Extracting...</p>
      </div>
      
      <div *ngIf="doc.extractionError" style="margin-top: 15px; padding: 10px; background-color: #ffebee; border-left: 3px solid #f44336; color: #c62828; font-size: 13px;">
        {{doc.extractionError}} 
        <div style="margin-top: 8px;">
          <button mat-button type="button" color="warn" (click)="retryExtraction(i)" style="line-height: 24px;">Retry</button>
        </div>
      </div>
      
      <!-- For marksheets: show extracted data confirmation -->
      <div *ngIf="doc.extractedData && !doc.isExtracting && !doc.verificationFailed && !doc.extractionError" style="margin-top: 15px; padding: 10px; background-color: #f1f8e9; border: 1px solid #81c784; border-radius: 4px; color: #1b5e20; font-size: 14px; display: flex; align-items: center;">
        <mat-icon style="margin-right: 5px; font-size: 20px; height: 20px; width: 20px;">check_circle</mat-icon>
        Extracted Successfully
      </div>
      <!-- For verification-only docs (Aadhaar, Caste Cert, etc.): show verified confirmation -->
      <div *ngIf="doc.isVerificationOnlyDoc && doc.file && !doc.isVerifying && !doc.verificationFailed && !doc.extractionError" style="margin-top: 15px; padding: 10px; background-color: #f1f8e9; border: 1px solid #81c784; border-radius: 4px; color: #1b5e20; font-size: 14px; display: flex; align-items: center;">
        <mat-icon style="margin-right: 5px; font-size: 20px; height: 20px; width: 20px;">check_circle</mat-icon>
        Verified Successfully
      </div>
    </div>

  </div>

  <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; display: flex; flex-direction: column; align-items: flex-end;">
    <button mat-raised-button color="primary" 
      [disabled]="isSubmitDisabled" 
      (click)="submit()"
      style="padding: 0 30px; height: 44px; font-size: 15px;">
      {{ isSubmitting ? 'Uploading...' : 'Submit' }}
    </button>
    <div *ngIf="submitError" style="color: #f44336; margin-top: 12px; font-size: 14px; font-weight: 500;">
      {{ submitError }}
    </div>
  </div>
</mat-dialog-content>
